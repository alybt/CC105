{% extends 'base.html' %}  
{% block content %}
<h2>Employees</h2>
<a href="{% url 'emp-create' %}" class="btn btn-success mb-3"><i class="bi bi-plus-circle"></i> Add Employee</a>

<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Job</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
    {% for emp in emps %}
        <tr>
            <td>{{ emp.empno }}</td>
            <td><a href="{% url 'emp-detail' emp.pk %}">{{ emp.ename }}</a></td>
            <td>{{ emp.job }}</td>
            <td>{{ emp.deptno.dname }}</td>
            <td>
                <a href="{% url 'emp-update' emp.pk %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'emp-delete' emp.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="5">No employees found.</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
